[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm install --include=dev && npm run build && cd ../backend && DATABASE_URL=postgresql://x:x@localhost:5432/x npm install && cp prisma/schema.prod.prisma prisma/schema.prisma && DATABASE_URL=postgresql://x:x@localhost:5432/x npx prisma generate"

[deploy]
startCommand = "cd backend && cp prisma/schema.prod.prisma prisma/schema.prisma && NODE_ENV=production node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
