[build]
builder = "nixpacks"
buildCommand = "cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install --ignore-scripts"

[deploy]
startCommand = "cd backend && cp prisma/schema.prod.prisma prisma/schema.prisma && npx prisma generate && npx prisma db push --accept-data-loss && node prisma/seed-prod.js && NODE_ENV=production node server.js"
healthcheckPath = "/api/questions?limit=1"
restartPolicyType = "on_failure"
